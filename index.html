<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Sales Pro</title>
  <meta name="theme-color" content="#1e293b">
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3214/3214746.png">
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=3">
</head>
<body>

<!-- Loading Overlay -->
<div id="LOADER" class="loader-overlay">
  <div class="loader-content">
    <div class="loader-icon">⚙️</div>
    <div class="loader-text">Sales Pro</div>
    <div class="loader-bar"><div class="loader-bar-fill"></div></div>
  </div>
</div>

<!-- Authentication Screen -->
<div id="AUTH" class="auth-wrap">
  <div class="auth-box">
    <h2 style="margin-bottom:20px;text-align:center;">Sales Pro Login</h2>
    <div style="display:flex;flex-direction:column;gap:12px;">
      <input type="email" id="inE" placeholder="Email" class="sbox" style="padding:12px;border:1px solid var(--bd);border-radius:8px;">
      <input type="password" id="inP" placeholder="Password" class="sbox" style="padding:12px;border:1px solid var(--bd);border-radius:8px;">
      <button id="bLog" class="btn btn-p" style="justify-content:center;padding:12px;">Login / Register</button>
      <button id="bLogG" class="btn" style="justify-content:center;padding:12px;background:white;color:black;">Sign in with Google</button>
      <p id="aErr" style="color:var(--rd);text-align:center;font-size:0.9rem;"></p>
    </div>
  </div>
</div>

<!-- Main App -->
<div id="APP" class="hidden" style="display:none;">
  <nav class="sidebar">
    <div class="sbt">
      <span class="sbr">⚙️ Sales Pro</span>
      <div class="sbb">
        <button id="bTh" title="Theme">🌗</button>
        <button id="bLn" title="Language">EN</button>
        <button id="bOt" title="Logout">خروج</button>
      </div>
    </div>
    <div id="NV"></div>
  </nav>
  <main class="mw" id="M"></main>
  <nav class="bnav">
    <div class="bni" id="BN"></div>
  </nav>
</div>

<!-- Toast -->
<div class="toast" id="TT"></div>

<!-- Scripts -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://apis.google.com/js/api.js" async defer></script>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="firebase-config.js?v=8"></script>
<script src="data-store.js?v=8"></script>
<script src="auth.js?v=8"></script>
<script src="ui-components.js?v=8"></script>
<script src="settings.js?v=8"></script>
<script src="app.js?v=8"></script>
<script src="gdrive.js?v=8"></script>
<script>
  // Hide loader when app is ready
  window.addEventListener('load', function() {
    if(typeof init === 'function') init();
    setTimeout(function() {
      var loader = document.getElementById('LOADER');
      if (loader) {
        loader.classList.add('fade-out');
        setTimeout(function() { loader.style.display = 'none'; }, 500);
      }
    }, 800);
  });

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for(var i = 0; i < registrations.length; i++) {
          registrations[i].unregister();
        }
      }).then(function() {
        navigator.serviceWorker.register('service-worker.js?v=' + new Date().getTime());
      });
    });
  }
</script>
</body>
</html>
